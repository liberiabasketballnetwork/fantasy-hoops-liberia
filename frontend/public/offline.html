<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F97316" />
  <title>You're Offline — Fantasy Hoops Liberia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0b0f14;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2733;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem;
      display: block;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #9ca3af;
      font-size: 0.875rem;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }
    .available {
      background: #0b0f14;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      margin-bottom: 1.75rem;
      text-align: left;
    }
    .available-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 0.75rem;
    }
    .available ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .available li {
      font-size: 0.875rem;
      color: #d1d5db;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .available li::before {
      content: "✓";
      color: #10b981;
      font-weight: 700;
      flex-shrink: 0;
    }
    .btn {
      display: inline-block;
      background: #F97316;
      color: #fff;
      font-weight: 600;
      font-size: 0.875rem;
      padding: 0.625rem 1.5rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icon-192.png" alt="Fantasy Hoops Liberia" class="icon"
         onerror="this.style.display='none'" />
    <h1>You're Offline</h1>
    <p class="subtitle">
      You need a connection to load this page.<br />
      Some features are still available while offline.
    </p>
    <div class="available">
      <p class="available-title">Available Offline</p>
      <ul>
        <li>Your previously viewed lineup</li>
        <li>Leaderboard (last cached)</li>
        <li>Player list (last cached)</li>
        <li>Your achievements</li>
      </ul>
    </div>
    <button class="btn" onclick="window.location.reload()">
      Try Again
    </button>
    <p class="footer">
      🇱🇷 Fantasy Hoops Liberia
    </p>
  </div>
</body>
</html>
